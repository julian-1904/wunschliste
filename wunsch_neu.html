<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Wünsch dir was! – Wunsch hinzufügen</title>

  <style>

    body{
      font-family:Arial;
      background:#eef4ff;
      padding:40px;
    }

    .header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:30px;
    }

    .title{
      font-size:30px;
      color:#4f7cff;
      font-weight:bold;
    }

    .button{
      background:#4f7cff;
      color:white;
      padding:10px 18px;
      border-radius:8px;
      text-decoration:none;
      border:none;
      cursor:pointer;
      font-size:14px;
      display:inline-block;
    }

    .button:hover{
      background:#3c66db;
    }

    .card{
      background:white;
      padding:35px;
      border-radius:14px;
      box-shadow:0 6px 18px rgba(0,0,0,0.15);
      max-width:700px;
    }

    .section-title{
      font-size:24px;
      color:#4f7cff;
      font-weight:bold;
      margin-bottom:20px;
    }

    .form-group{
      margin-bottom:18px;
    }

    label{
      display:block;
      font-weight:bold;
      margin-bottom:8px;
      color:#333;
    }

    input, textarea, select{
      width:100%;
      padding:10px;
      border:1px solid #cfdcff;
      border-radius:8px;
      font-size:14px;
      box-sizing:border-box;
    }

    textarea{
      min-height:100px;
      resize:vertical;
    }

    .actions{
      margin-top:25px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .preview img{
      width:160px;
      height:160px;
      object-fit:cover;
      border-radius:10px;
      border:1px solid #dbe7ff;
      margin-top:10px;
    }

  </style>
</head>

<body>

<div class="header">
  <div class="title">Wünsch dir was!</div>
</div>

<div class="card">

  <div class="section-title">Neuen Wunsch hinzufügen</div>

  <form th:action="@{'/wunschlisten/' + ${liste.id} + '/wuensche/neu'}"
        method="post"
        enctype="multipart/form-data">

    <div class="form-group">
      <label for="titel">Titel</label>
      <input type="text" id="titel" name="titel" required>
    </div>

    <div class="form-group">
      <label for="beschreibung">Beschreibung</label>
      <textarea id="beschreibung" name="beschreibung"></textarea>
    </div>

    <div class="form-group">
      <label for="preis">Preis (€)</label>
      <input type="number" step="0.01" id="preis" name="preis">
    </div>

    <div class="form-group">
      <label for="url">Produktlink</label>
      <input type="text" id="url" name="url">
    </div>

    <div class="form-group">
      <label for="bildUrl">Bild-URL</label>
      <input type="text" id="bildUrl" name="bildUrl">
    </div>

    <div class="form-group">
      <label for="bildDatei">Bild hochladen</label>
      <input type="file" id="bildDatei" name="bildDatei" accept="image/*">
    </div>

    <div class="form-group">
      <label for="prioritaet">Priorität</label>

      <select id="prioritaet" name="prioritaet" required>
        <option value="HOCH">hoch</option>
        <option value="MITTEL">mittel</option>
        <option value="NIEDRIG">niedrig</option>
      </select>

    </div>

    <div class="actions">

      <button type="submit" class="button">
        Wunsch speichern
      </button>

      <a th:href="@{'/wunschlisten/' + ${liste.id}}" class="button">
        Zurück
      </a>

    </div>

  </form>

</div>

</body>
</html>
