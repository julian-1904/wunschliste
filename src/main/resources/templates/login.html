<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Wünsch dir was! – Login</title>

    <style>

        body{
            font-family: Arial;
            background:#eef4ff;
            padding:40px;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .card{
            background:white;
            padding:40px;
            border-radius:12px;
            box-shadow:0 6px 14px rgba(0,0,0,0.15);
            width:320px;
        }

        .title{
            text-align:center;
            color:#4f7cff;
            font-size:28px;
            margin-bottom:5px;
        }

        .subtitle{
            text-align:center;
            margin-bottom:25px;
        }

        label{
            display:block;
            margin-top:10px;
        }

        input{
            width:100%;
            padding:10px;
            border-radius:6px;
            border:1px solid #ccc;
            margin-top:4px;
        }

        button{
            margin-top:20px;
            width:100%;
            background:#4f7cff;
            color:white;
            padding:10px;
            border:none;
            border-radius:8px;
            cursor:pointer;
        }

        button:hover{
            background:#3c66db;
        }

        .error{
            color:red;
            text-align:center;
        }

        .success{
            color:green;
            text-align:center;
        }

        .register{
            margin-top:20px;
            text-align:center;
        }

    </style>

</head>

<body>

<div class="card">

    <div class="title">Wünsch dir was!</div>
    <div class="subtitle">Login</div>

    <p th:if="${param.error}" class="error">
        Email oder Passwort ist falsch.
    </p>

    <p th:if="${param.logout}" class="success">
        Du wurdest erfolgreich ausgeloggt.
    </p>

    <form th:action="@{/login}" method="post">

        <label for="username">Email</label>
        <input id="username" name="username" type="email" required>

        <label for="password">Passwort</label>
        <input id="password" name="password" type="password" required>

        <button type="submit">Anmelden</button>

    </form>

    <div class="register">
        Noch kein Konto?
        <a th:href="@{/register}">Jetzt registrieren</a>
    </div>

</div>

</body>
</html>
