<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Wünsch dir was! – Neue Wunschliste</title>

  <style>
    body{
      font-family: Arial;
      background:#eef4ff;
      padding:40px;
    }

    .header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:30px;
      gap:20px;
      flex-wrap:wrap;
    }

    .title{
      font-size:28px;
      color:#4f7cff;
      font-weight:bold;
    }

    .button{
      background:#4f7cff;
      color:white;
      padding:10px 18px;
      border-radius:8px;
      text-decoration:none;
      display:inline-block;
      border:none;
      cursor:pointer;
      font-size:14px;
    }

    .button:hover{
      background:#3c66db;
    }

    .secondary-button{
      background:#6c757d;
      color:white;
      padding:10px 18px;
      border-radius:8px;
      text-decoration:none;
      display:inline-block;
      border:none;
      cursor:pointer;
      font-size:14px;
    }

    .secondary-button:hover{
      background:#5a6268;
    }

    .card{
      background:white;
      padding:30px;
      border-radius:12px;
      box-shadow:0 6px 14px rgba(0,0,0,0.15);
      max-width:700px;
    }

    .form-title{
      font-size:22px;
      margin-bottom:20px;
      font-weight:bold;
    }

    label{
      display:block;
      margin-top:14px;
      margin-bottom:6px;
      font-weight:bold;
      color:#444;
    }

    input{
      width:100%;
      padding:10px;
      border:1px solid #d0d7e2;
      border-radius:8px;
      font-size:14px;
      box-sizing:border-box;
    }

    .hint{
      margin-top:6px;
      color:#666;
      font-size:13px;
    }

    .actions{
      margin-top:24px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
  </style>
</head>

<body>

<div class="header">
  <div class="title">Wünsch dir was!</div>

  <a href="/wunschlisten" class="button">
    Meine Listen
  </a>
</div>

<div class="card">

  <div class="form-title">Neue Wunschliste erstellen</div>

  <form th:action="@{/wunschlisten/neu}" method="post" th:object="${wunschliste}">

    <label for="titel">Titel der Wunschliste</label>
    <input id="titel" type="text" th:field="*{titel}" required>

    <div class="hint">
      Zum Beispiel: Geburtstag, Weihnachten oder Hochzeit
    </div>

    <label for="eventdate">Eventdatum</label>
    <input id="eventdate" type="date" th:field="*{eventdate}">

    <div class="hint">
      Optional – damit du später sehen kannst, wie viele Tage noch bleiben
    </div>

    <div class="actions">
      <button type="submit" class="button">Wunschliste speichern</button>

      <a href="/wunschlisten" class="secondary-button">
        Abbrechen
      </a>
    </div>

  </form>

</div>

</body>
</html>
