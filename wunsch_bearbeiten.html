<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Wünsch dir was! – Wunsch bearbeiten</title>

  <style>
    body{
      font-family: Arial;
      background:#eef4ff;
      padding:40px;
    }

    .header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:30px;
    }

    .title{
      font-size:28px;
      color:#4f7cff;
      font-weight:bold;
    }

    .button{
      background:#4f7cff;
      color:white;
      padding:10px 18px;
      border-radius:8px;
      text-decoration:none;
      display:inline-block;
      border:none;
      cursor:pointer;
      font-size:14px;
    }

    .button:hover{
      background:#3c66db;
    }

    .secondary-button{
      background:#6c757d;
      color:white;
      padding:10px 18px;
      border-radius:8px;
      text-decoration:none;
      display:inline-block;
      border:none;
      cursor:pointer;
      font-size:14px;
    }

    .secondary-button:hover{
      background:#5a6268;
    }

    .card{
      background:white;
      padding:30px;
      border-radius:12px;
      box-shadow:0 6px 14px rgba(0,0,0,0.15);
      max-width:700px;
    }

    .form-title{
      font-size:22px;
      margin-bottom:20px;
    }

    label{
      display:block;
      margin-top:14px;
      margin-bottom:6px;
      font-weight:bold;
      color:#444;
    }

    input, textarea, select{
      width:100%;
      padding:10px;
      border:1px solid #d0d7e2;
      border-radius:8px;
      font-size:14px;
      box-sizing:border-box;
    }

    textarea{
      min-height:110px;
      resize:vertical;
    }

    .actions{
      margin-top:24px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
  </style>
</head>

<body>

<div class="header">
  <div class="title">Wünsch dir was!</div>

  <a th:href="@{'/wunschlisten/' + ${liste.id}}" class="button">
    Zurück zur Liste
  </a>
</div>

<div class="card">

  <div class="form-title">Wunsch bearbeiten</div>

  <form th:action="@{'/wuensche/' + ${wunsch.id} + '/bearbeiten'}"
        method="post"
        th:object="${wunsch}">

    <label for="titel">Titel</label>
    <input id="titel" type="text" th:field="*{titel}" required>

    <label for="url">Produktlink</label>
    <input id="url" type="url" th:field="*{url}">

    <label for="bildUrl">Bild-URL</label>
    <input id="bildUrl" type="url" th:field="*{bildUrl}">

    <label for="prioritaet">Priorität</label>
    <select id="prioritaet" th:field="*{prioritaet}" required>
      <option th:each="prioritaet : ${prioritaeten}"
              th:value="${prioritaet}"
              th:text="${prioritaet}">
      </option>
    </select>

    <label for="preis">Preis</label>
    <input id="preis" type="number" step="0.01" min="0" th:field="*{preis}">

    <label for="beschreibung">Beschreibung</label>
    <textarea id="beschreibung" th:field="*{beschreibung}"></textarea>

    <div class="actions">
      <button type="submit" class="button">Änderungen speichern</button>

      <a th:href="@{'/wunschlisten/' + ${liste.id}}" class="secondary-button">
        Abbrechen
      </a>
    </div>

  </form>

</div>

</body>
</html>
