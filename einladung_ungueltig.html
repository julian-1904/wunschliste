<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Wünsch dir was! – Ungültiger Einladungslink</title>

  <style>
    body{
      font-family: Arial;
      background:#eef4ff;
      padding:40px;
    }

    .header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:30px;
    }

    .title{
      font-size:30px;
      color:#4f7cff;
      font-weight:bold;
    }

    .button{
      background:#4f7cff;
      color:white;
      padding:10px 18px;
      border-radius:8px;
      text-decoration:none;
      border:none;
      cursor:pointer;
      font-size:14px;
      display:inline-block;
    }

    .button:hover{
      background:#3c66db;
    }

    .card{
      background:white;
      padding:35px;
      border-radius:14px;
      box-shadow:0 6px 18px rgba(0,0,0,0.15);
      max-width:700px;
    }

    .error-title{
      font-size:24px;
      color:#e74c3c;
      font-weight:bold;
      margin-bottom:14px;
    }

    .text{
      color:#555;
      font-size:16px;
      line-height:1.5;
      margin-bottom:24px;
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
  </style>
</head>

<body>

<div class="header">
  <div class="title">Wünsch dir was!</div>
</div>

<div class="card">
  <div class="error-title">Einladungslink ungültig</div>

  <div class="text" th:text="${fehlermeldung}">
    Dieser Einladungslink ist ungültig oder existiert nicht mehr.
  </div>

  <div class="actions">
    <a href="/wunschlisten" class="button">Zu meinen Listen</a>
  </div>
</div>

</body>
</html>
